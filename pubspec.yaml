name: artisango
description: ArtisanGo - A modern marketplace connecting customers with local artisans in Morocco.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.6.0
  firebase_analytics: ^10.7.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # Routing
  go_router: ^12.0.0

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

  # HTTP and Networking
  dio: ^5.3.0
  http: ^1.1.0

  # UI and Design
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  geocoding: ^2.1.0

  # Images and Media
  image_picker: ^1.0.2
  image_cropper: ^5.0.0
  video_player: ^2.7.0

  # Notifications
  flutter_local_notifications: ^14.1.0

  # Authentication
  google_sign_in: ^6.1.0
  sign_in_with_apple: ^5.0.0

  # Localization
  intl: ^0.19.0

  # Utilities
  uuid: ^4.0.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.6.0
  logger: ^2.2.0
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.0
  package_info_plus: ^5.0.0
  url_launcher: ^6.1.0
  permission_handler: ^11.4.0
  flutter_dotenv: ^5.1.0
  fl_chart: ^0.64.0
  lottie: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.1
  mockito: ^5.4.0
  mocktail: ^1.0.0
  bloc_test: ^9.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
